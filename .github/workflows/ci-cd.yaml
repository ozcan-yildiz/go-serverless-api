name: Production Grade Go CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  # STAGE 1: Continuous Integration (The Quality Gate)
  quality-assurance:
    name: Lint and Unit Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Go Toolchain
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Static Code Analysis (Lint)
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

      - name: Execute Tests with Race Detection
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Display Coverage Report
        run: go tool cover -func=coverage.out

  # STAGE 2: Continuous Delivery (Requires Human Approval)
  build-and-deploy:
    name: Containerize and Push to ECR
    needs: quality-assurance
    runs-on: ubuntu-latest
    # This triggers the Manual Approval requirement in GitHub UI
    environment: production 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Tag Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: my-go-app
          TAG: ${{ github.sha }} # Uses Git Hash as a unique version tag
        run: |
          # Build with multiple tags: unique hash for rollback, 'latest' for convenience
          docker build -t $REGISTRY/$REPOSITORY:$TAG -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$TAG
          docker push $REGISTRY/$REPOSITORY:latest